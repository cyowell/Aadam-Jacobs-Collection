name: Weekly Archive Update

on:
  schedule:
    - cron: '0 0 * * 0' # Midnight every Sunday
  workflow_dispatch: # Adds a manual "Run" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install internetarchive

      - name: Run update script
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Archive-Bot"
          git config --global user.email "bot@github.com"
          git add data/aadam_refined_data.csv
          git commit -m "Automated update: Added new archive records" || exit 0
          git push
