name: Weekly Archive Update

on:
  schedule:
    - cron: '0 6 * * 1' # 6am UTC every Monday
  workflow_dispatch: # Adds a manual "Run" button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow the bot to push commits

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install internetarchive atproto

      - name: Run update script
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Archive-Bot"
          git config --global user.email "bot@github.com"
          git add data/aadam_refined_data.csv
          git diff --cached --quiet || git commit -m "Automated update: Added new archive records [skip ci]"
          git push
